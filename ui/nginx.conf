server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/ {
        proxy_pass http://wizard-api:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://wizard-api:8080/openapi.json;
    }

    location /openapi.yaml {
        proxy_pass http://wizard-api:8080/openapi.yaml;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
