# Redirect HTTP to HTTPS
server {
    listen 3001;
    server_name _;
    return 301 https://$host:3443$request_uri;
}

# HTTPS server
server {
    listen 3443 ssl;
    server_name _;

    ssl_certificate /etc/enclave-wizard/tls/server.crt;
    ssl_certificate_key /etc/enclave-wizard/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8080/openapi.json;
    }

    location /openapi.yaml {
        proxy_pass http://127.0.0.1:8080/openapi.yaml;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
